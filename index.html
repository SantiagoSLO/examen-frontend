<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Sabor Colombiano</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-top: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .categoria-card {
            border: none;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .categoria-card:hover {
            transform: translateY(-5px);
        }
        .producto-card {
            border: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .producto-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="display-4 text-primary"><i class="fas fa-utensils"></i> Restaurante Sabor Colombiano</h1>
            <p class="lead">Descubre nuestros deliciosos platos tradicionales</p>
        </div>

        <div id="categorias" class="row">
            <!-- Categorias se cargarán aquí -->
        </div>

        <div id="productos" class="row mt-4">
            <!-- Productos se cargarán aquí -->
        </div>
    </div>

    <script>
        const backendUrl = 'https://your-backend-url.onrender.com'; // Reemplazar con la URL real del backend

        async function cargarCategorias() {
            try {
                const response = await fetch(`${backendUrl}/menu/api/categorias/`);
                const categorias = await response.json();
                const categoriasDiv = document.getElementById('categorias');
                
                categorias.forEach(categoria => {
                    const card = `
                        <div class="col-md-4 mb-3">
                            <div class="card categoria-card h-100">
                                <div class="card-body text-center">
                                    <h5 class="card-title">${categoria.nombre}</h5>
                                    <p class="card-text">${categoria.descripcion}</p>
                                    <button class="btn btn-primary" onclick="cargarProductos(${categoria.id})">
                                        Ver Productos
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    categoriasDiv.innerHTML += card;
                });
            } catch (error) {
                console.error('Error cargando categorías:', error);
            }
        }

        async function cargarProductos(categoriaId) {
            try {
                const response = await fetch(`${backendUrl}/menu/api/productos/?categoria=${categoriaId}`);
                const productos = await response.json();
                const productosDiv = document.getElementById('productos');
                productosDiv.innerHTML = '<h3 class="text-center mb-4">Productos</h3>';
                
                productos.forEach(producto => {
                    const card = `
                        <div class="col-md-4 mb-3">
                            <div class="card producto-card h-100">
                                <div class="card-body">
                                    <h5 class="card-title">${producto.nombre}</h5>
                                    <p class="card-text">${producto.descripcion}</p>
                                    <p class="card-text"><strong>Precio: $${producto.precio}</strong></p>
                                    <p class="card-text"><small class="text-muted">Tiempo: ${producto.tiempo_preparacion} min</small></p>
                                </div>
                            </div>
                        </div>
                    `;
                    productosDiv.innerHTML += card;
                });
            } catch (error) {
                console.error('Error cargando productos:', error);
            }
        }

        // Cargar categorías al iniciar
        window.onload = cargarCategorias;
    </script>
</body>
</html>
